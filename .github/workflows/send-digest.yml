name: Send AI Builders Digest

on:
  schedule:
    # 06:30 Asia/Singapore = 22:30 UTC on the previous day
    - cron: "30 22 * * *"
  workflow_dispatch:

concurrency:
  group: send-ai-builders-digest
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DIGEST_TIMEZONE: Asia/Singapore
      DIGEST_RECIPIENT: jingran2@lenovo.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Set digest metadata
        shell: bash
        run: |
          digest_date="$(TZ="$DIGEST_TIMEZONE" date +%F)"
          echo "DIGEST_DATE=$digest_date" >> "$GITHUB_ENV"
          echo "DIGEST_PATH=tmp/ai-builders-digest-$digest_date.txt" >> "$GITHUB_ENV"

      - name: Generate fresh feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          POD2TXT_API_KEY: ${{ secrets.POD2TXT_API_KEY }}
        working-directory: scripts
        run: node generate-feed.js

      - name: Compose digest from fork feeds
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        shell: bash
        run: |
          mkdir -p tmp
          if [ -z "$OPENAI_MODEL" ]; then
            export OPENAI_MODEL="gpt-5.2"
          fi
          node scripts/compose-digest.js --timezone "$DIGEST_TIMEZONE" --output "$DIGEST_PATH"

      - name: Send digest email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        shell: bash
        run: |
          printf -v digest_subject 'AI Builders Digest \u2014 %s' "${{ env.DIGEST_DATE }}"
          node scripts/deliver.js \
            --file "${{ env.DIGEST_PATH }}" \
            --method email \
            --email "${{ env.DIGEST_RECIPIENT }}" \
            --subject "$digest_subject"

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-builders-digest-${{ env.DIGEST_DATE }}
          path: ${{ env.DIGEST_PATH }}
          if-no-files-found: ignore

      - name: Commit and push feed updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
